name: PR Checks

on:
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Future-proofs actions against Node 20 deprecation

jobs:
  quality:
    name: Quality & Testing
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_BACKEND_URL: "http://localhost:8080/api/v1"
      BACKEND_INTERNAL_URL: "http://localhost:8080/api/v1"
      SITE_URL: "http://localhost:3000"
      AUTH_SECRET: "dummy-secret-for-build-purposes-only"
      AUTH_BASE_URL: "http://localhost:8080"
      JWT_SECRET: "dummy-jwt-secret"
      DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Linting & Formatting
        run: |
          npm run lint
          npm run format

      - name: Prisma Generate
        run: npx prisma generate --schema=apps/server/prisma/schema.prisma
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"

      - name: Run Backend Tests
        run: npm run test -w @veriworkly/server --if-present

      - name: Run Frontend Tests
        run: npm run test:contracts -w @veriworkly/resume-builder --if-present

      - name: Build All Applications
        run: npm run build

  visual-tests:
    name: Visual Regression Tests
    needs: quality
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_BACKEND_URL: "http://localhost:8080/api/v1"
      BACKEND_INTERNAL_URL: "http://localhost:8080/api/v1"
      SITE_URL: "http://localhost:3000"
      AUTH_SECRET: "dummy-secret-for-build-purposes-only"
      AUTH_BASE_URL: "http://localhost:8080"
      JWT_SECRET: "dummy-jwt-secret"
      DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Prisma Generate
        run: npx prisma generate --schema=apps/server/prisma/schema.prisma
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Run visual tests
        run: npm run test:visual -w @veriworkly/resume-builder --if-present

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/resume-builder/test-results/
          retention-days: 7
